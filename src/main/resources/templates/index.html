<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
        }

        .feature {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .feature-icon {
            font-size: 24px;
            margin-right: 8px;
        }

        .btn {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .api-link {
            display: inline-block;
            margin-top: 25px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .api-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .features {
                grid-template-columns: 1fr;
            }
            
            .card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🖼️</div>
            <h1>Image Compressor</h1>
            <p>
                Compress high-resolution images to PNG format while maintaining 
                transparency and high quality. Reduce file sizes from MB to KB 
                without losing visual fidelity.
            </p>
            
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">⚡</span>
                    <strong>Fast Processing</strong>
                </div>
                <div class="feature">
                    <span class="feature-icon">🔮</span>
                    <strong>Transparency</strong>
                </div>
                <div class="feature">
                    <span class="feature-icon">🎨</span>
                    <strong>High Quality</strong>
                </div>
                <div class="feature">
                    <span class="feature-icon">🔌</span>
                    <strong>REST API</strong>
                </div>
            </div>

            <a th:href="@{/compress}" class="btn">Start Compressing</a>
            
            <br>
            <a href="/api/v1/images/health" class="api-link">API Health Check</a>
        </div>
    </div>
</body>
</html>
